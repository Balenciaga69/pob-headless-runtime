name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    env:
      HOST_REPO: https://github.com/Balenciaga69/PathOfBuilding-Headless.git
      HOST_REF: Headless0000
    steps:
      - name: Checkout compatible PoB host repository
        shell: pwsh
        run: |
          git clone --depth 1 --branch $env:HOST_REF $env:HOST_REPO host

      - name: Checkout runtime repository into host layout
        uses: actions/checkout@v4
        with:
          path: host/pob-headless-runtime

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bootstrap tools
        shell: pwsh
        working-directory: host/pob-headless-runtime
        run: .\scripts\bootstrap.ps1

      - name: Check formatting
        shell: pwsh
        working-directory: host/pob-headless-runtime
        run: .\scripts\fmt.ps1 -Check

      - name: Run Luacheck
        shell: pwsh
        working-directory: host/pob-headless-runtime
        run: .\scripts\lint.ps1

      - name: Run tests
        shell: pwsh
        working-directory: host/pob-headless-runtime
        run: .\scripts\test.ps1
